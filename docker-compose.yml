version: '3.8'

services:
  ai-service:
    build: .
    container_name: kanzlei-ai-service
    ports:
      - "5000:5000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./rag_storage:/app/rag_storage
      - ./scripts:/app/scripts
      - ./rag_data:/app/rag_data
      - ./google_service_account.json:/app/google_service_account.json:ro
    # Override command for development to enable reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 5000 --reload
    restart: unless-stopped
    networks:
      - kanzlei-network

networks:
  kanzlei-network:
    external: true
